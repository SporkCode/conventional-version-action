name: Tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          tag-prefix: test

      - name: Print Output
        run: |
          echo "${{ steps.test-action.outputs.change }}"
          echo "${{ steps.test-action.outputs.last }}"
          echo "${{ steps.test-action.outputs.next }}"

  dependabot:
    name: Dependabot Auto Merge
    runs-on: ubuntu-latest
    needs:
      - test-action
      - test-typescript
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge
        run: gh pr merge --auto --merge ${{github.event.pull_request.html_url}}
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
